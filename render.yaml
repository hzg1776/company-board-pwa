databases:
  - name: company-board-pwa-db
    plan: free

services:
  - type: web
    name: company-board-pwa
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: company-board-pwa-db
          property: connectionString
